name: Score Refresh

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  score-calculate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: |
          pnpm --filter @pai/shared build
          pnpm --filter @pai/scoring build
          pnpm --filter @pai/providers build
          pnpm --filter @pai/db build

      - name: Run score calculation
        run: pnpm score:calculate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          WIKIMEDIA_USER_AGENT: PopularityIndex/0.1.0 (naveenanand.87@gmail.com)
          NODE_ENV: production
