name: Purge Non-Human DB Entries

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print what would be deleted without deleting)'
        type: boolean
        default: true
      fast_only:
        description: 'Fast only (pattern pass only, skip Wikidata verification)'
        type: boolean
        default: false

jobs:
  purge:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared + db packages
        run: |
          pnpm --filter @pai/shared build
          pnpm --filter @pai/db build

      - name: Purge non-human entries
        run: |
          FLAGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then FLAGS="$FLAGS --dry-run"; fi
          if [ "${{ inputs.fast_only }}" = "true" ]; then FLAGS="$FLAGS --fast-only"; fi
          pnpm --filter @pai/worker purge:non-humans $FLAGS
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WIKIMEDIA_USER_AGENT: PopularityIndex/0.1.0 (naveenanand.87@gmail.com)
          NODE_ENV: production
