version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: pai_db
      POSTGRES_USER: pai_user
      POSTGRES_PASSWORD: pai_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U pai_user -d pai_db']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
